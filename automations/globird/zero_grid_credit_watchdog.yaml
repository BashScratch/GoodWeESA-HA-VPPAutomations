alias: "GoodWe ESA: Zero Hero Daily Credit Watchdog"
description: >
  GloBird's Zero-Grid daily credit (~$1) is forfeit if peak-window grid
  imports exceed the ZEROHERO Threshold, stated in the current welcome
  pack as "0.03 kWh/Hour". That's an average power of 30W across the
  6pm-9pm peak window. The most natural reading: total imports during
  the full 3-hour window must not exceed 0.03 kWh/hour x 3 hours =
  0.09 kWh (90 Wh). It's a tolerance, not a zero-import requirement -
  a fridge compressor cycling on briefly is fine; the kettle plus the
  dryer plus the oven all on at once, blowing past your inverter's
  discharge cap, is not. This automation watches accumulated grid
  import during the full 3-hour window and fires an actionable
  notification once you cross your alert threshold, giving you a
  chance to turn off heavy loads before you actually approach
  GloBird's 0.09 kWh limit.

  REQUIRES a utility_meter helper that resets daily at 18:00 and tracks
  grid imports during the peak window. See the helpers block below.

mode: single

# =============================================================================
# REQUIRED HELPERS / CONFIG (create these before enabling):
#
#   1. utility_meter.zero_hero_peak_grid_import   (config-level - see notes below)
#      - Source sensor: sensor.goodwe_total_energy_import (or your equivalent)
#      - Cycle: daily
#      - Offset: 18:00 (so it resets at the start of the peak window)
#
#   2. input_number.zero_hero_credit_alert_threshold
#      - Min 0, max 1000, step 1, unit Wh
#      - Note: HA's helper UI doesn't have an "initial value" field. Create
#        the helper, then set its value to 25 from the helper page.
#      - Starting value to set: 25 (Wh - alerts you when 25Wh of grid import has
#        accumulated during peak. GloBird's current ZEROHERO key conditions
#        give the threshold as 0.03 kWh/hour, which on the natural reading
#        means 0.09 kWh total (90 Wh) across the full 3-hour 6pm-9pm window.
#        25 Wh accumulated gives you a clear heads-up well before that
#        limit. Note: GloBird's wording is slightly ambiguous - it could
#        also be read as a per-hour cap of 30 Wh/hour - so the 25 Wh
#        default is conservative under either interpretation. If yours
#        keeps tripping at 25 Wh on uneventful nights, raise it; if you
#        want earlier warning, lower it. Source: GloBird ZEROHERO welcome
#        pack, current at time of writing - check your own welcome pack
#        for what applies to your plan.)
#
# Note on utility_meter setup: the simplest way is via the HA UI:
#   Settings > Devices & services > Helpers > Create Helper > Utility Meter
#     Source: your goodwe_total_energy_import sensor
#     Reset cycle: daily
#     Cycle offset: 0:18 (HH:MM in some HA versions, or use 18:00:00 in YAML)
#
# If you'd rather configure via YAML, add to configuration.yaml:
#   utility_meter:
#     zero_hero_peak_grid_import:
#       source: sensor.goodwe_total_energy_import   # EDIT: your import sensor
#       cycle: daily
#       offset:
#         hours: 18
# =============================================================================

triggers:
  - trigger: numeric_state
    entity_id: sensor.zero_hero_peak_grid_import   # EDIT: your utility_meter entity (HA names it from the helper)
    above: input_number.zero_hero_credit_alert_threshold

conditions:
  # Only act during the peak window. The utility_meter resets at 18:00 so the
  # number can only climb during peak; this condition is belt-and-braces in
  # case the meter logic is misconfigured.
  - condition: time
    after: "18:00:00"
    before: "21:00:00"   # EDIT: change to 20:00 if your peak window ends at 20:00
  - condition: state
    entity_id: input_boolean.zero_hero_enabled   # don't fire when Zero Hero is disabled
    state: "on"

actions:
  - action: notify.mobile_app_your_device_name   # EDIT: your notify service
    data:
      title: Zero Hero Daily Credit at Risk
      message: >-
        {{ states('sensor.zero_hero_peak_grid_import') | float(0) | round(0) }}Wh
        of grid import accumulated so far this peak window. GloBird's
        ZEROHERO threshold is 0.03 kWh/hour (around 0.09 kWh / 90 Wh total
        across the 3-hour window) - turn off heavy loads now to stay under
        and keep tonight's $1 credit.
      data:
        # iOS actionable notification - tap to mute the warning for tonight
        # or escalate. Adjust action identifiers to your dashboard.
        actions:
          - action: ZERO_HERO_MUTE_CREDIT_WARNING
            title: Mute warning tonight
        push:
          interruption-level: time-sensitive
