alias: "GoodWe ESA: GloBird Zero Hero (Method 4 - Hybrid)"
description: >
  Hybrid delegation strategy for GloBird Zero Hero. The 11:00-14:00 free charging
  window is handled natively by a GoodWe Economic Mode / TOU schedule set in the
  SolarGo/SEMS+ app - the firmware charges to 100% and holds correctly without HA
  intervention, solving the battery-drain edge case that HA's fast_charging_switch
  could not prevent.

  HA handles the smart layer: at 17:56 it evaluates SOC once and sets a STEPPED
  peak export limit by battery level (>=80% -> 5kW, 70-80% -> 3kW, 65-70% -> 2kW,
  60-65% -> 1kW, below 60% -> 0), balancing Super Export earnings against the
  overnight reserve. A floor guard drops export to 0 if SOC craters during the
  window, and the SOC-sensor-unavailable case fails safe to 0. At peak end HA
  restores the limit and sends the nightly profit notification. All tariff
  values are read from input_number helpers so rates can be updated from the
  dashboard without touching YAML.

  See GLOSSARY.md for the full terminology breakdown (Eco Mode vs Economic Mode
  vs TOU, and what each system owns in this delegation strategy).
mode: queued
max: 5

# =============================================================================
# REQUIRED HELPERS (create via Settings > Helpers > Number / Toggle):
#   input_boolean.zero_hero_enabled          - master on/off toggle
#   input_boolean.zero_hero_skip_export      - one-night skip toggle (auto-clears at midnight reset)
#   input_number.zero_hero_export_start      - internal session kWh tracker
#   input_number.zero_hero_rate_super        - super export rate $/kWh  (e.g. 0.10)
#   input_number.zero_hero_rate_base         - base export rate $/kWh   (e.g. 0.02)
#   input_number.zero_hero_rate_credit       - daily zero-grid credit $ (e.g. 1.00)
#   input_number.zero_hero_super_cap         - kWh cap for super rate   (15 current, 10 older plan)
#   input_number.zero_hero_floor_guard_soc   - SOC % that triggers the mid-window floor guard
#                                              (default 40 - see the floor guard branch below)
#   input_number.zero_hero_max_export        - inverter's nominal AC export ceiling in W
#                                              (10000 for the 10kW ESA, 5000 for the 5kW, etc.
#                                              this is what HA restores the export limit to at peak end)
#
# GOODWE APP SETUP REQUIRED:
#   In SolarGo / SEMS+, create an Economic Mode / TOU charge schedule:
#     Time:    11:00 - 13:55  (not 14:00 - the inverter takes ~30s to wind
#              down after the slot ends; ending 5 min early keeps the
#              ramp-down inside the free window instead of billing the
#              tail at shoulder rates. See prereq 08.)
#     Target:  100% SOC
#     Source:  Grid (high priority)
#   This replaces the HA fast_charging_switch approach and correctly holds the
#   battery at 100% for the remainder of the window without HA involvement.
#   See GLOSSARY.md for the Economic Mode / TOU naming explanation.
# =============================================================================

triggers:
  - trigger: time
    at: "00:01:00"
    id: midnight_reset

  # Free window triggers removed - handled by GoodWe native Economic Mode / TOU schedule.
  # - trigger: time
  #   at: "11:02:00"
  #   id: free_start
  # - trigger: time
  #   at: "13:59:00"
  #   id: free_end

  # EDIT: Peak window timing varies by GloBird plan vintage.
  #   Newer plans (default below): 18:00-21:00 (peak_end should be 21:01)
  #   Older plans:                 18:00-20:00 (peak_end should be 20:01)
  - trigger: time
    at: "17:56:00"
    id: peak_guard_check

  - trigger: time
    at: "21:01:00"   # EDIT: change to 20:01 if your plan runs to 20:00
    id: peak_end

  # Floor guard: fires when SOC crosses below the guard threshold. The branch
  # below only acts during the peak window - see the FLOOR GUARD section.
  - trigger: numeric_state
    entity_id: sensor.goodwe_battery_state_of_charge   # EDIT: your SOC sensor
    below: input_number.zero_hero_floor_guard_soc
    id: floor_guard

conditions: []

actions:
  - choose:

      # ==========================================================
      # MIDNIGHT RESET
      # Resets the export tracker and turns off the fast charging
      # switch as a safety net. The fast_charging_switch line is
      # legacy from when an earlier version of this automation used
      # fast-charge as the primary charging mechanism. The charge is
      # now owned by the SEMS+ TOU schedule, so this line just
      # catches the case where someone manually flipped the switch
      # on during the day and forgot to turn it back off.
      #
      # The switch.turn_off uses continue_on_error so installs without
      # the experimental HACS integration (where this entity does not
      # exist) silently no-op rather than failing the whole sequence.
      # ==========================================================
      - conditions:
          - condition: trigger
            id: midnight_reset
        sequence:
          - action: switch.turn_off
            target:
              entity_id: switch.goodwe_fast_charging_switch   # EDIT: your GoodWe Fast Charging Switch (experimental HACS only - safe to leave as-is on native installs)
            continue_on_error: true
          - action: input_number.set_value
            target:
              entity_id: input_number.zero_hero_export_start
            data:
              value: 0
          # Clear the one-night skip toggle so it only ever skips a single night.
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.zero_hero_skip_export

      # ==========================================================
      # 5:56 PM - PRE-PEAK GUARD CHECK
      # Verify SOC is sufficient before arming peak export.
      # ==========================================================
      - conditions:
          - condition: trigger
            id: peak_guard_check
          - condition: state
            entity_id: input_boolean.zero_hero_enabled
            state: "on"
        sequence:
          # If the user flipped the skip toggle, block export for tonight
          # (limit 0) to conserve the battery while keeping the zero-import
          # daily credit, then stop. The toggle auto-clears at midnight reset.
          - if:
              - condition: state
                entity_id: input_boolean.zero_hero_skip_export
                state: "on"
            then:
              - action: number.set_value
                target:
                  entity_id: number.goodwe_grid_export_limit   # EDIT: your Grid Export Limit entity (may be _2 suffixed)
                data:
                  value: 0
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: "Zero Hero: Export Skipped"
                  message: >-
                    Export skipped tonight - battery conserved. Zero-import
                    daily credit still active.
              - stop: Export skipped by user toggle

          - wait_template: >
              {{ is_number(states('sensor.goodwe_battery_state_of_charge')) and
              is_number(states('sensor.goodwe_meter_total_energy_export')) }}
            timeout: "00:02:00"
            continue_on_timeout: true

          # FAIL-SAFE: if the SOC sensor is unavailable, force the export limit
          # to 0 rather than leaving it unchanged. "Unchanged" at 17:56 means the
          # limit is still at your inverter's ceiling from last night's restore -
          # and at 18:00 the TOU discharge slot opens at 100% power, so an
          # unknown-SOC battery would export flat-out all evening. 0 is the only
          # safe answer when we can't see the battery.
          # (If only the meter-export sensor is dead, export still arms - you
          # just lose tonight's profit notification, which needs the baseline.)
          - if:
              - condition: template
                value_template: >
                  {{ not is_number(states('sensor.goodwe_battery_state_of_charge')) }}   # EDIT: your SOC sensor
            then:
              - action: number.set_value
                target:
                  entity_id: number.goodwe_grid_export_limit   # EDIT: your Grid Export Limit entity (may be _2 suffixed)
                data:
                  value: 0
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: Zero Hero Aborted (fail-safe)
                  message: >-
                    SOC sensor unavailable at 17:56. Export limit set to 0 to
                    protect the battery. Check GoodWe integration.
              - stop: SOC sensor unavailable - failed safe to 0

          # Enable the export-limit switch and verify it actually turned on.
          # number.goodwe_grid_export_limit is only enforced by the inverter when
          # this switch is on. If it's off, the inverter exports at full AC power
          # regardless of what we write to the number entity. This is the single
          # most common reason Method 4 "appears to work" (trace looks fine, value
          # set) but the inverter still pushes at full power during peak.
          # See prereq 05 for the entity reference.
          - action: switch.turn_on
            target:
              entity_id: switch.goodwe_grid_export_limit_switch   # EDIT: your switch entity (typically no _2 suffix even on dual-integration installs)
            continue_on_error: true

          # Wait up to 60 seconds for the new state to reflect via the next
          # integration poll cycle. Default polling is 30s; 60s gives a
          # comfortable margin without eating into the 4-minute window before
          # peak starts at 18:00.
          - wait_template: >
              {{ states('switch.goodwe_grid_export_limit_switch') == 'on' }}
            timeout: "00:01:00"
            continue_on_timeout: true

          # If after the wait the switch is still not on, abort. Writing the
          # number value would be pointless (inverter ignores it) and firing
          # the "Armed" notification would mislead the user into thinking
          # everything is fine.
          - if:
              - condition: not
                conditions:
                  - condition: state
                    entity_id: switch.goodwe_grid_export_limit_switch
                    state: "on"
            then:
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: Zero Hero Aborted - Export Limit Switch Off
                  message: >-
                    switch.goodwe_grid_export_limit_switch could not be enabled.
                    The inverter ignores the export-limit value when this switch
                    is off, so peak export would not be capped. Manually toggle
                    the switch on in HA (Settings > Devices & services > GoodWe)
                    and verify tonight's export.
              - stop: Export limit switch is off; not safe to proceed

          # ------------------------------------------------------------
          # STEPPED EXPORT BRACKETS - evaluated ONCE, at 17:56.
          #
          # The old all-or-nothing guard ("SOC above 65% -> export 5kW,
          # else nothing") had a failure mode on low-start days: a battery
          # at 66% would arm the full 5kW, dump 15 kWh across the window,
          # and end the night nearly flat - forcing shoulder-rate imports
          # before the free window opens at 11:00. Exported kWh earn the
          # super rate ($0.10); the same kWh cover shoulder imports worth
          # $0.385. Draining the reserve to chase the cap loses money.
          #
          # So instead of one threshold, the export rate scales with what
          # the battery can actually spare. The design math, worked on a
          # 48 kWh pack whose house draws ~13.5-16 kWh between peak end
          # and the 11:00 free window:
          #
          #   SOC 17:56   armed    window kWh   window-end SOC   ~SOC at 11am
          #   >= 80%      5 kW     ~15          ~46-56%          ~16-22%
          #   70-80%      3 kW     ~9           ~48-55%          ~18-22%
          #   65-70%      2 kW     ~6           ~50-53%          ~20-22%
          #   60-65%      1 kW     ~3           ~52-56%          ~22-26%
          #   < 60%       0        0            (reserve held for overnight)
          #
          # Every bracket lands the battery in the mid-teens-to-twenties by
          # 11am - full super-window earnings when there's headroom, zero
          # forced imports when there isn't.
          #
          # EDIT: TUNE THE BRACKETS to your battery. The arithmetic per row:
          #   window kWh = kW x 3 h (your peak window length)
          #   SOC spent  = window kWh / usable kWh x 100
          #   left at 11am = SOC - SOC spent - (overnight house kWh / usable kWh x 100)
          # Pick wattages so "left at 11am" stays comfortably above your
          # inverter's discharge floor in every row. Smaller batteries want
          # fewer, gentler brackets; a 13.5 kWh pack might be a single
          # "above 80% -> 2kW, else 0" step.
          #
          # Thresholds sit at x9.5 / x4.5 because many GoodWe SOC sensors
          # report whole integers - 79.5 arms the 5kW row at a reported
          # 80%, without an exact-boundary ambiguity.
          # ------------------------------------------------------------
          - variables:
              export_w: >-
                {% set soc = states('sensor.goodwe_battery_state_of_charge') | float(0) %}   {# EDIT: your SOC sensor #}
                {% if soc >= 79.5 %} 5000
                {% elif soc >= 69.5 %} 3000
                {% elif soc >= 64.5 %} 2000
                {% elif soc >= 59.5 %} 1000
                {% else %} 0
                {% endif %}

          - if:
              - condition: template
                value_template: "{{ export_w | int(0) > 0 }}"
            then:
              - action: input_number.set_value
                target:
                  entity_id: input_number.zero_hero_export_start
                data:
                  value: >-
                    {{ states('sensor.goodwe_meter_total_energy_export') | float(0) }}   # EDIT: your Meter Export sensor (grid feed-in)
              - action: number.set_value
                target:
                  entity_id: number.goodwe_grid_export_limit   # EDIT: your Grid Export Limit entity (may be _2 suffixed)
                data:
                  value: "{{ export_w | int(0) }}"
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: "Zero Hero Armed ({{ (export_w | int(0) / 1000) | round(1) }}kW)"
                  message: >-
                    SOC {{ states('sensor.goodwe_battery_state_of_charge') }}% -
                    exporting at {{ (export_w | int(0) / 1000) | round(1) }}kW
                    until end of peak.
            else:
              - if:
                  - condition: numeric_state
                    entity_id: number.goodwe_grid_export_limit   # EDIT: your Grid Export Limit entity
                    above: 0
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.goodwe_grid_export_limit
                    data:
                      value: 0
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: "Zero Hero: No Export"
                  message: >-
                    SOC {{ states('sensor.goodwe_battery_state_of_charge') }}%
                    is below the lowest export bracket. Export held at 0 to
                    protect the overnight reserve.

      # ==========================================================
      # PEAK END (21:01 default; 20:01 for older GloBird plans)
      # Restores normal export behaviour and reports nightly profit.
      # ==========================================================
      - conditions:
          - condition: trigger
            id: peak_end
        sequence:
          - if:
              - condition: numeric_state
                entity_id: number.goodwe_grid_export_limit   # EDIT: your Grid Export Limit entity
                below: input_number.zero_hero_max_export
            then:
              - action: number.set_value
                target:
                  entity_id: number.goodwe_grid_export_limit
                data:
                  value: "{{ states('input_number.zero_hero_max_export') | float(10000) }}"

          - condition: numeric_state
            entity_id: input_number.zero_hero_export_start
            above: 0

          - action: notify.mobile_app_your_device_name   # EDIT: your notify service
            data:
              title: Zero Hero Complete
              message: >
                {% set start_exp  = states('input_number.zero_hero_export_start') | float(0) %}
                {% set end_exp    = states('sensor.goodwe_meter_total_energy_export') | float(0) %}
                {% set kwh_sold   = [(end_exp - start_exp), 0] | max | round(2) %}

                {# Rates and cap pulled from helpers - edit via the UI, not here. #}
                {% set rate_super = states('input_number.zero_hero_rate_super') | float(0.10) %}
                {% set rate_base  = states('input_number.zero_hero_rate_base')  | float(0.02) %}
                {% set credit     = states('input_number.zero_hero_rate_credit') | float(1.00) %}
                {% set super_cap  = states('input_number.zero_hero_super_cap')   | float(15) %}

                {% set super_kwh  = [kwh_sold, super_cap] | min %}
                {% set base_kwh   = [kwh_sold - super_cap, 0] | max %}
                {% set profit     = ((super_kwh * rate_super) + (base_kwh * rate_base)) | round(2) %}
                {% set total      = (profit + credit) | round(2) %}

                Exported {{ kwh_sold }} kWh to grid. Revenue: ${{ '%.2f' | format(profit) }}
                + ${{ '%.2f' | format(credit) }} daily credit
                = ${{ '%.2f' | format(total) }}. Goodnight.

          - action: input_number.set_value
            target:
              entity_id: input_number.zero_hero_export_start
            data:
              value: 0

      # ==========================================================
      # FLOOR GUARD - anomaly catch during the peak window.
      # The 17:56 brackets are a one-shot decision based on the SOC at
      # that moment. If the evening then goes off-script - an unexpected
      # oven+aircon+EV pile-up, a cloud-wrecked afternoon charge, a
      # bracket you tuned too hot - the battery can fall through the
      # floor mid-window with the export limit still armed. This branch
      # kills export the moment SOC crosses below
      # input_number.zero_hero_floor_guard_soc during the window.
      #
      # TUNING: this is an ANOMALY catch, not a scheduler. Set it BELOW
      # where your planned bracket trajectories bottom out, or it'll
      # fire on nights that are going exactly to plan. On the 48 kWh
      # worked example the brackets bottom out around 46-56% at window
      # end, so 40% only trips when something is genuinely wrong. If
      # your overnight load regularly runs heavier than the design
      # assumption, raise it a couple of points rather than re-cutting
      # every bracket.
      #
      # The zero-import daily credit is unaffected - the battery keeps
      # covering the house; only grid export stops.
      # ==========================================================
      - conditions:
          - condition: trigger
            id: floor_guard
          - condition: time
            after: "18:00:00"
            before: "21:00:00"   # EDIT: change to 20:00 if your plan's peak ends at 20:00
          - condition: state
            entity_id: input_boolean.zero_hero_enabled
            state: "on"
        sequence:
          - if:
              - condition: numeric_state
                entity_id: number.goodwe_grid_export_limit   # EDIT: your Grid Export Limit entity
                above: 0
            then:
              - action: number.set_value
                target:
                  entity_id: number.goodwe_grid_export_limit
                data:
                  value: 0
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: "Zero Hero: Floor Guard"
                  message: >-
                    Battery dropped below the floor guard
                    ({{ states('sensor.goodwe_battery_state_of_charge') }}%)
                    during peak - export stopped to protect tonight's reserve.
