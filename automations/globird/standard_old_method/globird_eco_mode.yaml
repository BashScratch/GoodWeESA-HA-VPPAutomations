alias: "GoodWe ESA: GloBird Eco Mode (Method 1)"
description: >
  Uses standard Home Assistant integration to toggle Eco Mode for free charging and peak exporting.
  Note: This writes to flash memory and will erase any schedules in the SEMS+ app.
mode: queued
max: 5

triggers:
  - trigger: time
    at: "00:01:00"
    id: midnight_reset
  - trigger: time
    at: "11:00:00"
    id: free_start
  - trigger: time
    at: "14:00:00"
    id: free_end
  - trigger: time
    at: "17:56:00"
    id: peak_guard_check
  - trigger: time
    at: "18:00:00"
    id: peak_export_start
  # Note: Adjust peak_end to 20:00 or 21:00 depending on your exact GloBird contract
  - trigger: time
    at: "21:00:00"
    id: peak_export_end

conditions: []

actions:
  - choose:
      # ==========================================
      # MIDNIGHT RESET
      # ==========================================
      - conditions:
          - condition: trigger
            id: midnight_reset
        sequence:
          - action: input_number.set_value
            target:
              entity_id: input_number.zero_hero_export_start
            data:
              value: 0

      # ==========================================
      # 11:00 AM - FORCE CHARGE (ECO MODE)
      # ==========================================
      - conditions:
          - condition: trigger
            id: free_start
        sequence:
          - action: select.select_option
            target:
              entity_id: select.inverter_operation_mode # EDIT: Replace with your GoodWe Operation Mode entity
            data:
              option: "Eco mode"
          - action: number.set_value
            target:
              entity_id: number.inverter_eco_mode_power # EDIT: Replace with your GoodWe Eco Mode Power entity
            data:
              # EDIT: Check if your integration uses % or W. Use -100 for 100% charge, or -5000 for 5kW.
              value: -100

      # ==========================================
      # 2:00 PM - END FREE CHARGE (GENERAL MODE)
      # ==========================================
      - conditions:
          - condition: trigger
            id: free_end
        sequence:
          - action: select.select_option
            target:
              entity_id: select.inverter_operation_mode
            data:
              option: "General mode"

      # ==========================================
      # 5:56 PM - PRE-PEAK GUARD CHECK
      # ==========================================
      - conditions:
          - condition: trigger
            id: peak_guard_check
          - condition: state
            entity_id: input_boolean.zero_hero_enabled
            state: "on"
        sequence:
          - wait_template: >
              {{ is_number(states('sensor.goodwe_battery_state_of_charge')) and 
              is_number(states('sensor.goodwe_total_energy_export')) }}
            timeout: "00:02:00"
            continue_on_timeout: true
          - if:
              - condition: template
                value_template: >
                  {{ not is_number(states('sensor.goodwe_battery_state_of_charge')) }}
            then:
              - action: notify.mobile_app_your_device_name # EDIT: Replace with your HA Companion App device name
                data:
                  title: Zero Hero Aborted
                  message: >-
                    SOC sensor unavailable at 17:56. Check GoodWe integration.
              - stop: SOC sensor unavailable
          - choose:
              - conditions:
                  - condition: numeric_state
                    entity_id: sensor.goodwe_battery_state_of_charge # EDIT: Replace with your GoodWe SOC sensor
                    above: 64.9
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: input_number.zero_hero_export_start
                    data:
                      value: >-
                        {{ states('sensor.goodwe_total_energy_export') | float(0) }} # EDIT: Replace with your GoodWe Total Export sensor
                  - action: notify.mobile_app_your_device_name # EDIT: Replace with your device name
                    data:
                      title: Zero Hero Armed
                      message: >-
                        Peak export armed. SOC {{ states('sensor.goodwe_battery_state_of_charge') }} percent. 
                        Awaiting 6:00 PM trigger.
            default:
              - action: notify.mobile_app_your_device_name # EDIT: Replace with your device name
                data:
                  title: Zero Hero Alert
                  message: >-
                    Peak export blocked. SOC {{ states('sensor.goodwe_battery_state_of_charge') }} percent is too low.

      # ==========================================
      # 6:00 PM - FORCE EXPORT (ECO MODE)
      # ==========================================
      - conditions:
          - condition: trigger
            id: peak_export_start
          - condition: state
            entity_id: input_boolean.zero_hero_enabled
            state: "on"
          - condition: numeric_state
            entity_id: input_number.zero_hero_export_start
            above: 0
        sequence:
          - action: select.select_option
            target:
              entity_id: select.inverter_operation_mode
            data:
              option: "Eco mode"
          - action: number.set_value
            target:
              entity_id: number.inverter_eco_mode_power
            data:
              # EDIT: Check if your integration uses % or W. Use 100 for 100% discharge, or 5000 for 5kW.
              value: 100

      # ==========================================
      # 9:00 PM - END EXPORT (GENERAL MODE)
      # ==========================================
      - conditions:
          - condition: trigger
            id: peak_export_end
        sequence:
          - action: select.select_option
            target:
              entity_id: select.inverter_operation_mode
            data:
              option: "General mode"
          - if:
              - condition: numeric_state
                entity_id: input_number.zero_hero_export_start
                above: 0
            then:
              - action: notify.mobile_app_your_device_name # EDIT: Replace with your device name
                data:
                  title: Zero Hero Complete
                  message: >
                    {% set start_exp = states('input_number.zero_hero_export_start') | float(0) %} 
                    {% set end_exp = states('sensor.goodwe_total_energy_export') | float(0) %} 
                    {% set kwh_sold = [(end_exp - start_exp), 0] | max | round(2) %}  
                    {% set super_kwh = [kwh_sold, 10] | min %} 
                    {% set base_kwh = [kwh_sold - 10, 0] | max %} 
                    {% set profit = ((super_kwh * 0.15) + (base_kwh * 0.06)) | round(2) %} 
                    {% set credit = 1.00 %} 
                    {% set total = (profit + credit) | round(2) %} 
                    Exported {{ kwh_sold }} kWh. Revenue: ${{ '%.2f' | format(profit) }} + $1.00 daily
                    credit = ${{ '%.2f' | format(total) }}. Goodnight.
              - action: input_number.set_value
                target:
                  entity_id: input_number.zero_hero_export_start
                data:
                  value: 0
