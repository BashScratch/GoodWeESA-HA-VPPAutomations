alias: "GoodWe ESA: GloBird EMS Control (Method 2)"
description: >
  Uses the experimental EMS Mode to force discharge without writing to flash memory.
  Requires the HACS GoodWe Experimental integration.
mode: queued

triggers:
  - trigger: time
    at: "11:00:00"
    id: free_charge_start
  - trigger: time
    at: "14:00:00"
    id: stop_commands
  - trigger: time
    at: "18:00:00"
    id: peak_export_start
  - trigger: time
    at: "21:00:00" # Adjust to 20:00 or 21:00 based on your plan
    id: peak_export_end

actions:
  - choose:
      # ==========================================
      # 11:00 AM - FORCE CHARGE (RAM COMMAND)
      # ==========================================
      - conditions:
          - condition: trigger
            id: free_charge_start
        sequence:
          - action: select.select_option
            target:
              entity_id: select.inverter_ems_mode # EDIT: Confirm your EMS Mode entity name
            data:
              option: "Charge"
          - action: number.set_value
            target:
              entity_id: number.inverter_ems_power_set # EDIT: Confirm your EMS Power entity name
            data:
              value: 5000 # Charges at 5kW

      # ==========================================
      # 6:00 PM - FORCE EXPORT (RAM COMMAND)
      # ==========================================
      - conditions:
          - condition: trigger
            id: peak_export_start
          - condition: state
            entity_id: input_boolean.zero_hero_enabled
            state: "on"
        sequence:
          - action: select.select_option
            target:
              entity_id: select.inverter_ems_mode
            data:
              option: "Export AC"
          - action: number.set_value
            target:
              entity_id: number.inverter_ems_power_set
            data:
              value: 5000 # Forcefully dumps 5kW into the grid

      # ==========================================
      # RESET TO AUTO (CLEARS COMMANDS)
      # ==========================================
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: stop_commands
              - condition: trigger
                id: peak_export_end
        sequence:
          - action: select.select_option
            target:
              entity_id: select.inverter_ems_mode
            data:
              option: "Auto" # Returns to standard behavior
