alias: "GoodWe ESA: GloBird Zero Hero (Method 3 - EMS RAM Commands)"
description: >
  Uses EMS (Energy Management System) RAM registers via the experimental HACS
  integration to force charging and exporting. Preserves SolarGo/SEMS+ TOU
  schedules (the operation mode is never changed) and writes nothing to flash.
  IMPORTANT: Check the exact option strings for select.goodwe_ems_mode in
  Developer Tools before saving - they vary by inverter model and firmware.
  Method 3 is experimental. Read the README before enabling.
  See GLOSSARY.md for EMS mode descriptions.
mode: queued
max: 5

# =============================================================================
# REQUIRED INTEGRATION
#   GoodWe Experimental by mletenay (via HACS):
#     https://github.com/mletenay/home-assistant-goodwe-inverter
#
# REQUIRED HELPERS (create these in HA before use):
#   input_boolean.zero_hero_enabled          - master toggle
#   input_boolean.zero_hero_force_safe       - panic switch: forces inverter to Auto
#   input_number.zero_hero_export_start      - tracks export kWh at peak start
#   input_number.zero_hero_rate_super        - GloBird super export rate $/kWh (e.g. 0.10)
#   input_number.zero_hero_rate_base         - GloBird base export rate $/kWh (e.g. 0.02)
#   input_number.zero_hero_rate_credit       - GloBird daily zero-grid credit (e.g. 1.00)
#   input_number.zero_hero_super_cap         - kWh cap for super rate (15 current, 10 older plan)
#   input_number.zero_hero_min_export_soc    - SOC % below which peak export is blocked
#   input_number.zero_hero_peak_export       - target peak export power in W (default 5000;
#                                              tune via dashboard to match inverter size + plan cap)
#   input_number.zero_hero_ems_charge_power  - free-window charge power in W (default 5000).
#                                              Set to your inverter's AC nameplate (10000 for the
#                                              10kW ESA) to charge at full AC rate. EMS charging
#                                              is AC-only, so this tops out at your nominal AC.
# See automations/globird/README.md for full helper setup instructions.
#
# WATCHDOG: This automation includes a 5-minute watchdog (17:55-22:00) that
# returns the inverter to "Auto" mode if zero_hero_enabled is off or
# zero_hero_force_safe is on. This addresses the failure mode where HA crashes
# mid-export and leaves the inverter stuck in forced-discharge.
# =============================================================================

triggers:
  - trigger: time
    at: "00:01:00"
    id: midnight_reset
  - trigger: time
    at: "11:00:00"
    id: free_charge_start
  - trigger: time
    at: "14:00:00"
    id: free_charge_end
  - trigger: time
    at: "18:00:00"
    id: peak_export_start
  # EDIT: Change to 20:00 if your GloBird plan's peak ends at 20:00.
  - trigger: time
    at: "21:00:00"
    id: peak_export_end
  - trigger: time_pattern
    minutes: "/5"
    id: watchdog

conditions: []

actions:
  - choose:

      # ==========================================================
      # MIDNIGHT RESET
      # ==========================================================
      - conditions:
          - condition: trigger
            id: midnight_reset
        sequence:
          - action: input_number.set_value
            target:
              entity_id: input_number.zero_hero_export_start
            data:
              value: 0

      # ==========================================================
      # 11:00 AM - FORCE CHARGE (EMS RAM COMMAND)
      # Skipped if zero_hero_enabled is off.
      # IMPORTANT: Verify "Charge" is a valid option for your select.goodwe_ems_mode
      # entity before enabling. Check Developer Tools > States first.
      # ==========================================================
      - conditions:
          - condition: trigger
            id: free_charge_start
          - condition: state
            entity_id: input_boolean.zero_hero_enabled
            state: "on"
          - condition: state
            entity_id: input_boolean.zero_hero_force_safe
            state: "off"
        sequence:
          - wait_template: >
              {{ is_number(states('sensor.goodwe_battery_state_of_charge')) }}
            timeout: "00:02:00"
            continue_on_timeout: true
          - if:
              - condition: template
                value_template: >
                  {{ not is_number(states('sensor.goodwe_battery_state_of_charge')) }}
            then:
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: Zero Hero Aborted
                  message: >-
                    SOC sensor unavailable at 11:00. Charge command not sent.
              - stop: SOC sensor unavailable
          - action: select.select_option
            target:
              entity_id: select.goodwe_ems_mode   # EDIT: your GoodWe EMS Mode entity
            data:
              option: "Charge"   # EDIT: verify this string matches your entity's options
          - action: number.set_value
            target:
              entity_id: number.goodwe_ems_power_limit   # EDIT: your GoodWe EMS Power Limit entity
            data:
              # Charge power pulled from the helper (default 5000W). The old hardcoded
              # 5000 silently capped free-window charging at half the AC ceiling on a
              # 10kW ESA - set zero_hero_ems_charge_power to your AC nameplate (e.g.
              # 10000) to charge at full rate. EMS charging is AC-only, so this caps
              # at nominal AC regardless (no AC+DC blending - that needs Method 4's TOU).
              value: "{{ states('input_number.zero_hero_ems_charge_power') | float(5000) }}"

      # ==========================================================
      # 2:00 PM - END FREE CHARGE (RETURN TO AUTO)
      # ==========================================================
      - conditions:
          - condition: trigger
            id: free_charge_end
        sequence:
          - action: select.select_option
            target:
              entity_id: select.goodwe_ems_mode
            data:
              option: "Auto"   # EDIT: verify this string matches your entity's options

      # ==========================================================
      # 6:00 PM - FORCE EXPORT (EMS RAM COMMAND)
      # Records baseline export for profit calculation.
      # The EMS discharge mode covers house load first, then exports the target wattage.
      # ==========================================================
      - conditions:
          - condition: trigger
            id: peak_export_start
          - condition: state
            entity_id: input_boolean.zero_hero_enabled
            state: "on"
          - condition: state
            entity_id: input_boolean.zero_hero_force_safe
            state: "off"
        sequence:
          - wait_template: >
              {{ is_number(states('sensor.goodwe_battery_state_of_charge')) and
              is_number(states('sensor.goodwe_meter_total_energy_export')) }}
            timeout: "00:02:00"
            continue_on_timeout: true
          - if:
              - condition: template
                value_template: >
                  {{ not is_number(states('sensor.goodwe_battery_state_of_charge')) or
                     not is_number(states('sensor.goodwe_meter_total_energy_export')) }}
            then:
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: Zero Hero Aborted
                  message: >-
                    SOC or Meter Export sensor unavailable at 18:00. Export
                    command not sent and profit calc would be broken.
              - stop: required sensor unavailable
          - if:
              - condition: numeric_state
                entity_id: sensor.goodwe_battery_state_of_charge   # EDIT: your SOC sensor
                below: input_number.zero_hero_min_export_soc
            then:
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: Zero Hero Alert
                  message: >-
                    Peak export blocked. SOC {{ states('sensor.goodwe_battery_state_of_charge') }}%
                    is below your minimum export threshold.
              - stop: SOC below threshold
          - action: input_number.set_value
            target:
              entity_id: input_number.zero_hero_export_start
            data:
              value: >-
                {{ states('sensor.goodwe_meter_total_energy_export') | float(0) }}   # EDIT: your Meter Export sensor (grid feed-in)
          - action: select.select_option
            target:
              entity_id: select.goodwe_ems_mode
            data:
              # EDIT: verify this string. The EMS discharge scenario that covers house
              # load first and then exports the remaining target wattage. See GLOSSARY.md.
              option: "Discharge"   # EDIT: may be "Export AC", "Discharge", or similar - check your entity
          - action: number.set_value
            target:
              entity_id: number.goodwe_ems_power_limit
            data:
              # Target discharge/export in Watts. Pulled from input_number.zero_hero_peak_export
              # helper (default 5000W = 5kW). 5 kW * 3 h = 15 kWh, which is exactly the
              # current Super Export cap, so the default fills the cap without overshoot.
              # See the helper documentation in automations/globird/README.md for tuning
              # guidance if you're on a different cap or a smaller battery.
              value: "{{ states('input_number.zero_hero_peak_export') | float(5000) }}"

      # ==========================================================
      # PEAK END (20:00 or 21:00)
      # Returns to Auto mode and reports nightly profit.
      # ==========================================================
      - conditions:
          - condition: trigger
            id: peak_export_end
        sequence:
          - action: select.select_option
            target:
              entity_id: select.goodwe_ems_mode
            data:
              option: "Auto"   # EDIT: verify this string matches your entity's options
          - if:
              - condition: numeric_state
                entity_id: input_number.zero_hero_export_start
                above: 0
            then:
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: Zero Hero Complete
                  message: >
                    {% set start_exp  = states('input_number.zero_hero_export_start') | float(0) %}
                    {% set end_exp    = states('sensor.goodwe_meter_total_energy_export') | float(0) %}
                    {% set kwh_sold   = [(end_exp - start_exp), 0] | max | round(2) %}

                    {% set rate_super = states('input_number.zero_hero_rate_super') | float(0.10) %}
                    {% set rate_base  = states('input_number.zero_hero_rate_base')  | float(0.02) %}
                    {% set credit     = states('input_number.zero_hero_rate_credit') | float(1.00) %}
                    {% set super_cap  = states('input_number.zero_hero_super_cap')   | float(15) %}

                    {% set super_kwh  = [kwh_sold, super_cap] | min %}
                    {% set base_kwh   = [kwh_sold - super_cap, 0] | max %}
                    {% set profit     = ((super_kwh * rate_super) + (base_kwh * rate_base)) | round(2) %}
                    {% set total      = (profit + credit) | round(2) %}

                    {# Rate labels render from the helpers too, so the message
                       stays honest when GloBird moves the rates - no stale
                       hard-coded cent values. %g drops trailing zeros. #}
                    {% set sup_c  = '%g' | format(rate_super * 100) %}
                    {% set base_c = '%g' | format(rate_base * 100) %}

                    Exported {{ kwh_sold }} kWh to grid: {{ super_kwh | round(2) }} kWh
                    @ {{ sup_c }}c super{% if base_kwh > 0 %} + {{ base_kwh | round(2) }} kWh
                    @ {{ base_c }}c base{% endif %}.
                    Revenue: ${{ '%.2f' | format(profit) }}
                    + ${{ '%.2f' | format(credit) }} daily credit
                    = ${{ '%.2f' | format(total) }}. Goodnight.
              - action: input_number.set_value
                target:
                  entity_id: input_number.zero_hero_export_start
                data:
                  value: 0

      # ==========================================================
      # WATCHDOG - runs every 5 minutes
      # Returns the inverter to Auto if it's stuck in a forced mode outside
      # an active window (HA crashed mid-export, or similar). Also acts
      # immediately when force_safe is flipped on as a panic switch.
      # Active windows (watchdog suppressed): 11:00-14:01 (charge) and 18:00-21:01
      # (peak). End times padded 1 min past the end triggers - see the inline note
      # on the time conditions below for why. If the inverter is already Auto, this
      # does nothing.
      # ==========================================================
      - conditions:
          - condition: trigger
            id: watchdog
          - condition: not
            conditions:
              - condition: state
                entity_id: select.goodwe_ems_mode
                state: "Auto"   # EDIT: verify this matches your entity's "Auto" option
          - condition: or
            conditions:
              # Panic switch - always overrides
              - condition: state
                entity_id: input_boolean.zero_hero_force_safe
                state: "on"
              # Or: outside both active windows.
              # Window starts match the trigger times exactly. HA's time condition
              # treats `after` as inclusive, so at 11:00:00 / 18:00:00 the time
              # counts as INSIDE the window and the watchdog stays suppressed,
              # letting free_charge_start / peak_export_start run unopposed.
              # Window ends are set ONE MINUTE PAST the end triggers (14:01 / 21:01).
              # HA treats `before` as exclusive, so without the extra minute the
              # watchdog would be un-suppressed at exactly 14:00:00 / 21:00:00 and
              # could fire a spurious "stuck mode" reset/notification racing the
              # free_charge_end / peak_export_end trigger (both converge on Auto,
              # but the watchdog alert is noise). The 1-minute pad keeps it quiet
              # while the end trigger does the clean Auto transition.
              - and:
                  - condition: not
                    conditions:
                      - condition: time
                        after: "11:00:00"
                        before: "14:01:00"
                  - condition: not
                    conditions:
                      - condition: time
                        after: "18:00:00"
                        before: "21:01:00"   # EDIT: change to 20:01 if peak_end is 20:00
        sequence:
          - variables:
              stuck_mode: "{{ states('select.goodwe_ems_mode') }}"
          - action: select.select_option
            target:
              entity_id: select.goodwe_ems_mode
            data:
              option: "Auto"   # EDIT: verify this matches your entity's options
          - action: notify.mobile_app_your_device_name   # EDIT: your notify service
            data:
              title: Zero Hero Watchdog
              message: >-
                Inverter was in {{ stuck_mode }} mode outside an active window.
                Returned to Auto.
