alias: "GoodWe ESA: GloBird Zero Hero (Method 2 - Standard Eco Mode)"
description: >
  Uses the standard GoodWe integration's Eco Mode (Economic Mode) to force charging
  at 11:00 and force exporting at 18:00. Simple, but two tradeoffs vs Method 3:
    1. Charges at 10kW max (HA cannot command DC + AC blended charging - for the
       full 13.5kW you need a SEMS+ TOU schedule, which is what Method 3 uses).
    2. Overwrites any Economic Mode / TOU schedules set in the GoodWe SolarGo/SEMS+ app.
  See automations/globird/README.md for the full method comparison.
  See GLOSSARY.md for the Eco Mode / Economic Mode / TOU naming explanation.
mode: queued
max: 5

# =============================================================================
# REQUIRED HELPERS (create these in HA before use):
#   input_boolean.zero_hero_enabled               - master toggle
#   input_number.zero_hero_export_start           - tracks export kWh at peak start
#   input_number.zero_hero_rate_super             - GloBird super export rate $/kWh (e.g. 0.15)
#   input_number.zero_hero_rate_base              - GloBird base export rate $/kWh (e.g. 0.06)
#   input_number.zero_hero_rate_credit            - GloBird daily zero-grid credit (e.g. 1.00)
#   input_number.zero_hero_super_cap              - kWh cap for super rate (10 or 15)
#   input_number.zero_hero_eco_charge_power       - free-window charge magnitude (see UNIT-TRAP below)
#   input_number.zero_hero_eco_discharge_power    - peak-window discharge magnitude (see UNIT-TRAP below)
#   input_number.zero_hero_min_export_soc         - SOC % below which peak export is blocked
# See automations/globird/README.md for full helper setup instructions.
#
# -----------------------------------------------------------------------------
# UNIT-TRAP - read this before setting the two eco_power helpers.
# Some integration builds expect Eco Mode Power as a PERCENTAGE (-100 to 100,
# negative = charge, positive = discharge). Others expect WATTS (typically
# -5000 to 5000, but on larger inverters can be wider, e.g. -10000 to 10000
# on a 10kW ESA). If the automation runs but nothing visibly happens at the
# inverter, this is the first thing to check.
#
# Verify which mode and what bounds yours uses:
#   1. Open Developer Tools > States > search for `goodwe_eco_mode_power`.
#   2. Look at the entity's `min` / `max` attributes:
#        min=-100,  max=100        > percentage mode.
#        min=-5000+, max=5000+     > watts mode (the exact numbers reflect your
#                                    inverter's nominal AC capacity).
#
# Recommended starting values for each helper:
#
#   zero_hero_eco_charge_power - the magnitude used for the 11:00 force-charge.
#     - Percentage mode: set to 100 (charge at the inverter's full AC rate).
#     - Watts mode: set to your inverter's nominal AC rating - e.g. 10000 for
#       a 10kW ESA, 8000 for 8kW, 5000 for 5kW. HA can only command AC charging
#       on this method, so this caps at your AC nameplate.
#
#   zero_hero_eco_discharge_power - the magnitude used for the 18:00 peak export.
#     - Watts mode: set to 5000. The math is 5 kW * 3 h = 15 kWh = current
#       Super Export cap, so 5000 hits the cap exactly across the peak window
#       without overshooting into the much-lower base feed-in rate.
#     - Percentage mode: set to the percentage that equals 5000W on your
#       inverter (50% on a 10kW, 100% on a 5kW, ~63% on an 8kW, etc.).
#     - If you're on the older 10 kWh cap plan, use 3333 watts (or the
#       equivalent percentage) instead.
#
#   For first-run safety, set both helpers to a small value (e.g. 25 or 1000)
#   and watch what the inverter actually does before scaling up.
#
# This automation always treats each helper as the MAGNITUDE - it sends the
# charge helper as a negative value at 11:00 and the discharge helper as a
# positive value at 18:00.
# -----------------------------------------------------------------------------
# =============================================================================

triggers:
  - trigger: time
    at: "00:01:00"
    id: midnight_reset
  - trigger: time
    at: "11:00:00"
    id: free_start
  - trigger: time
    at: "14:00:00"
    id: free_end
  - trigger: time
    at: "17:56:00"
    id: peak_guard_check
  - trigger: time
    at: "18:00:00"
    id: peak_export_start
  # EDIT: Change to 20:00 if your GloBird plan's peak ends at 20:00.
  - trigger: time
    at: "21:00:00"
    id: peak_export_end

conditions: []

actions:
  - choose:

      # ==========================================================
      # MIDNIGHT RESET
      # ==========================================================
      - conditions:
          - condition: trigger
            id: midnight_reset
        sequence:
          - action: input_number.set_value
            target:
              entity_id: input_number.zero_hero_export_start
            data:
              value: 0

      # ==========================================================
      # 11:00 AM - FORCE CHARGE (ECO / ECONOMIC MODE)
      # LFP chemistry is fine to regularly fully charge - see main README.
      # "Eco mode" in HA = "Economic Mode" in the GoodWe app - see GLOSSARY.md.
      # Note: HA can only command the AC side, so charging tops out at the
      # inverter's AC limit (~10kW). For full 13.5kW (10 AC + 3.5 DC blended),
      # use Method 3 with a SEMS+ TOU schedule instead.
      # ==========================================================
      - conditions:
          - condition: trigger
            id: free_start
        sequence:
          - action: select.select_option
            target:
              entity_id: select.goodwe_inverter_operation_mode   # EDIT: your GoodWe Operation Mode entity
            data:
              option: "Eco mode"
          - action: number.set_value
            target:
              entity_id: number.goodwe_eco_mode_power   # EDIT: your GoodWe Eco Mode Power entity
            data:
              # Negative = charge. Magnitude pulled from the charge helper - see UNIT-TRAP block at top of file.
              value: "{{ (states('input_number.zero_hero_eco_charge_power') | float(100)) * -1 }}"
          - if:
              - condition: state
                entity_id: input_boolean.zero_hero_enabled
                state: "on"
            then:
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: Zero Hero Free Window
                  message: >-
                    Charge started. SOC {{ states('sensor.goodwe_battery_state_of_charge') }}%.
                    Window ends 14:00.

      # ==========================================================
      # 2:00 PM - END FREE CHARGE (BACK TO GENERAL MODE)
      # ==========================================================
      - conditions:
          - condition: trigger
            id: free_end
        sequence:
          - action: select.select_option
            target:
              entity_id: select.goodwe_inverter_operation_mode
            data:
              option: "General mode"

      # ==========================================================
      # 5:56 PM - PRE-PEAK GUARD CHECK
      # ==========================================================
      - conditions:
          - condition: trigger
            id: peak_guard_check
          - condition: state
            entity_id: input_boolean.zero_hero_enabled
            state: "on"
        sequence:
          - wait_template: >
              {{ is_number(states('sensor.goodwe_battery_state_of_charge')) and
              is_number(states('sensor.goodwe_total_energy_export')) }}
            timeout: "00:02:00"
            continue_on_timeout: true
          - if:
              - condition: template
                value_template: >
                  {{ not is_number(states('sensor.goodwe_battery_state_of_charge')) }}
            then:
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: Zero Hero Aborted
                  message: >-
                    SOC sensor unavailable at 17:56. Check GoodWe integration.
              - stop: SOC sensor unavailable
          - choose:
              - conditions:
                  - condition: numeric_state
                    entity_id: sensor.goodwe_battery_state_of_charge   # EDIT: your SOC sensor
                    # Threshold pulled from helper - tune via dashboard, not YAML.
                    above: input_number.zero_hero_min_export_soc
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: input_number.zero_hero_export_start
                    data:
                      value: >-
                        {{ states('sensor.goodwe_total_energy_export') | float(0) }}
                  - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                    data:
                      title: Zero Hero Armed
                      message: >-
                        Peak export armed. SOC {{ states('sensor.goodwe_battery_state_of_charge') }}%.
                        Awaiting 6:00 PM trigger.
            default:
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: Zero Hero Alert
                  message: >-
                    Peak export blocked. SOC {{ states('sensor.goodwe_battery_state_of_charge') }}% is too low.

      # ==========================================================
      # 6:00 PM - FORCE EXPORT (ECO / ECONOMIC MODE)
      # ==========================================================
      - conditions:
          - condition: trigger
            id: peak_export_start
          - condition: state
            entity_id: input_boolean.zero_hero_enabled
            state: "on"
          - condition: numeric_state
            entity_id: input_number.zero_hero_export_start
            above: 0
        sequence:
          - action: select.select_option
            target:
              entity_id: select.goodwe_inverter_operation_mode
            data:
              option: "Eco mode"
          - action: number.set_value
            target:
              entity_id: number.goodwe_eco_mode_power
            data:
              # Positive = discharge/export. Magnitude from the discharge helper - see UNIT-TRAP block at top of file.
              # Default 5000W = 5kW. 5 kW * 3 h = 15 kWh = current Super Export cap, so this hits the cap exactly.
              value: "{{ states('input_number.zero_hero_eco_discharge_power') | float(5000) }}"

      # ==========================================================
      # PEAK END (20:00 or 21:00 depending on plan)
      # Restore General Mode and report nightly profit.
      # ==========================================================
      - conditions:
          - condition: trigger
            id: peak_export_end
        sequence:
          - action: select.select_option
            target:
              entity_id: select.goodwe_inverter_operation_mode
            data:
              option: "General mode"
          - if:
              - condition: numeric_state
                entity_id: input_number.zero_hero_export_start
                above: 0
            then:
              - action: notify.mobile_app_your_device_name   # EDIT: your notify service
                data:
                  title: Zero Hero Complete
                  message: >
                    {% set start_exp  = states('input_number.zero_hero_export_start') | float(0) %}
                    {% set end_exp    = states('sensor.goodwe_total_energy_export') | float(0) %}
                    {% set kwh_sold   = [(end_exp - start_exp), 0] | max | round(2) %}

                    {% set rate_super = states('input_number.zero_hero_rate_super') | float(0.15) %}
                    {% set rate_base  = states('input_number.zero_hero_rate_base')  | float(0.06) %}
                    {% set credit     = states('input_number.zero_hero_rate_credit') | float(1.00) %}
                    {% set super_cap  = states('input_number.zero_hero_super_cap')   | float(10) %}

                    {% set super_kwh  = [kwh_sold, super_cap] | min %}
                    {% set base_kwh   = [kwh_sold - super_cap, 0] | max %}
                    {% set profit     = ((super_kwh * rate_super) + (base_kwh * rate_base)) | round(2) %}
                    {% set total      = (profit + credit) | round(2) %}

                    Exported {{ kwh_sold }} kWh. Revenue: ${{ '%.2f' | format(profit) }}
                    + ${{ '%.2f' | format(credit) }} daily credit
                    = ${{ '%.2f' | format(total) }}. Goodnight.
              - action: input_number.set_value
                target:
                  entity_id: input_number.zero_hero_export_start
                data:
                  value: 0
