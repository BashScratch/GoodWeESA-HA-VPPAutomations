alias: "GoodWe ESA: Grid voltage soak (turn on dump load if voltage is high)"
description: >
  AS/NZS 4777.2 sets 253V (230V + 10%) as the maximum steady-state grid
  voltage. The actual inverter trip thresholds are higher: typically a
  10-minute average trip around 258V and a fast 1-second trip around 260V.
  So if your local grid voltage is climbing into the 252-255V range on hot
  afternoons (high solar penetration in your street pushing voltage up),
  you're heading toward the trip thresholds and your inverter will start
  curtailing export before it actually trips off.

  This automation watches grid voltage and engages a configurable dump
  load (heat pump hot water, EV charger, pool pump, anything resistive)
  when voltage climbs above the steady-state max, soaking up some of the
  local surplus and pulling voltage back down before it gets near the
  actual trip thresholds.

  This is a protection automation. You probably won't see it fire often,
  but when it does it's saving you a forced shutdown.

mode: single

# =============================================================================
# REQUIRED HELPERS:
#
#   input_number.voltage_soak_trigger     - voltage at which to turn on the load
#                                           Default: 252 (V). Min 240, max 255, step 0.5.
#   input_number.voltage_soak_release     - voltage at which to turn it off again
#                                           Default: 247 (V). Set lower than trigger
#                                           to avoid rapid cycling (hysteresis).
#                                           Min 240, max 255, step 0.5.
#   input_boolean.voltage_soak_enabled    - master toggle (default off until you've
#                                           tested it)
#
# REQUIRED CONFIG:
#   - The "load to dump to" entity. Replace switch.dump_load_smart_plug below
#     with whatever switch entity drives your hot water system, EV charger,
#     pool pump, or similar.
# =============================================================================

triggers:
  - trigger: numeric_state
    entity_id: sensor.goodwe_on_grid_l1_voltage_2   # EDIT: pick the voltage sensor that matches "actual grid voltage". On Mitch's install both sensor.goodwe_on_grid_l1_voltage_2 (the on-grid voltage) and sensor.goodwe_back_up_l1_voltage (the back-up port voltage) read close together while on-grid - either works for this purpose. The on-grid sensor is more semantically correct since this automation protects against grid-side voltage climb. The _2 suffix appears if you have both native and experimental integrations installed; drop it if your install only has one.
    above: input_number.voltage_soak_trigger
    for:
      minutes: 1   # don't fire on transient spikes
    id: voltage_high
  - trigger: numeric_state
    entity_id: sensor.goodwe_back_up_l1_voltage   # EDIT: same sensor as above
    below: input_number.voltage_soak_release
    for:
      minutes: 5   # require sustained drop before turning off
    id: voltage_normal

conditions:
  - condition: state
    entity_id: input_boolean.voltage_soak_enabled
    state: "on"

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: voltage_high
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.dump_load_smart_plug   # EDIT: your dump-load switch entity
          - action: notify.mobile_app_your_device_name   # EDIT: your notify service
            data:
              title: Grid voltage high - dump load engaged
              message: >-
                Grid voltage hit {{ states('sensor.goodwe_back_up_l1_voltage') }}V.
                Turned on dump load to soak it up.

      - conditions:
          - condition: trigger
            id: voltage_normal
        sequence:
          - action: switch.turn_off
            target:
              entity_id: switch.dump_load_smart_plug
