alias: "GoodWe ESA: GloBird Zero Hero Command"
description: >
  Always Eco strategy for the current plan. Manages free charging period (11am-2pm) and
  enforces a strict grid export limit between 18:00 and 20:00 to maximize profit.
  Calculates nightly earnings based on current rates.
mode: queued
max: 5

triggers:
  - trigger: time
    at: "00:01:00"
    id: midnight_reset
  - trigger: time
    at: "11:02:00"
    id: free_start
  - trigger: time
    at: "13:59:00"
    id: free_end
  # NOTE: Adjust peak times below based on your GloBird plan (Older plans: 18:00-20:00, Newer plans: 18:00-21:00)
  - trigger: time
    at: "17:56:00"
    id: peak_guard_check
  - trigger: time
    at: "20:01:00"
    id: peak_end

conditions: []

actions:
  - choose:
      # ==========================================
      # MIDNIGHT RESET
      # ==========================================
      - conditions:
          - condition: trigger
            id: midnight_reset
        sequence:
          - action: switch.turn_off
            target:
              entity_id: switch.goodwe_fast_charging_switch # EDIT: Replace with your GoodWe Fast Charging Switch
          - action: input_number.set_value
            target:
              entity_id: input_number.zero_hero_export_start # EDIT: Ensure you have created this Helper in HA
            data:
              value: 0

      # ==========================================
      # 11:02 AM - START FREE CHARGING
      # ==========================================
      - conditions:
          - condition: trigger
            id: free_start
        sequence:
          - action: number.set_value
            target:
              entity_id: number.goodwe_fast_charging_soc # EDIT: Replace with your GoodWe Fast Charging SOC entity
            data:
              value: 100
          - action: switch.turn_on
            target:
              entity_id: switch.goodwe_fast_charging_switch
          - action: number.set_value
            target:
              entity_id: number.goodwe_battery_discharge_power_limit # EDIT: Replace with your GoodWe Discharge Limit entity
            data:
              value: 0

      # ==========================================
      # 1:59 PM - END FREE CHARGING
      # ==========================================
      - conditions:
          - condition: trigger
            id: free_end
        sequence:
          - action: switch.turn_off
            target:
              entity_id: switch.goodwe_fast_charging_switch
          - action: number.set_value
            target:
              entity_id: number.goodwe_battery_discharge_power_limit
            data:
              value: 10000

      # ==========================================
      # 5:56 PM - PRE-PEAK GUARD CHECK
      # ==========================================
      - conditions:
          - condition: trigger
            id: peak_guard_check
          - condition: state
            entity_id: input_boolean.zero_hero_enabled # EDIT: Ensure you have created this Toggle Helper in HA
            state: "on"
        sequence:
          - wait_template: >
              {{ is_number(states('sensor.goodwe_battery_state_of_charge')) and 
              is_number(states('sensor.goodwe_total_energy_export')) }}
            timeout: "00:02:00"
            continue_on_timeout: true
          - if:
              - condition: template
                value_template: >
                  {{ not
                  is_number(states('sensor.goodwe_battery_state_of_charge')) }}
            then:
              - action: notify.mobile_app_your_device_name # EDIT: Replace with your HA Companion App device name
                data:
                  title: Zero Hero Aborted
                  message: >-
                    SOC sensor unavailable at 17:56. Export limit unchanged.
                    Check GoodWe integration.
              - stop: SOC sensor unavailable
          - choose:
              - conditions:
                  - condition: numeric_state
                    entity_id: sensor.goodwe_battery_state_of_charge # EDIT: Replace with your GoodWe SOC sensor
                    above: 64.9
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: input_number.zero_hero_export_start
                    data:
                      value: >-
                        {{ states('sensor.goodwe_total_energy_export') | float(0) }} # EDIT: Replace with your GoodWe Total Export sensor
                  - action: number.set_value
                    target:
                      entity_id: number.goodwe_grid_export_limit # EDIT: Replace with your GoodWe Export Limit entity
                    data:
                      value: 5000
                  - action: notify.mobile_app_your_device_name # EDIT: Replace with your device name
                    data:
                      title: Zero Hero Armed
                      message: >-
                        Eco mode active. SOC {{
                        states('sensor.goodwe_battery_state_of_charge') }}
                        percent. Exporting at 5kW until end of peak.
            default:
              - if:
                  - condition: numeric_state
                    entity_id: number.goodwe_grid_export_limit
                    above: 0
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.goodwe_grid_export_limit
                    data:
                      value: 0
              - action: notify.mobile_app_your_device_name # EDIT: Replace with your device name
                data:
                  title: Zero Hero Alert
                  message: >-
                    Peak export blocked. SOC {{
                    states('sensor.goodwe_battery_state_of_charge') }} percent 
                    is too low. Export limit dropped to 0W.

      # ==========================================
      # 8:01 PM - END PEAK EXPORT
      # ==========================================
      - conditions:
          - condition: trigger
            id: peak_end
        sequence:
          - if:
              - condition: numeric_state
                entity_id: number.goodwe_grid_export_limit
                below: 10000
            then:
              - action: number.set_value
                target:
                  entity_id: number.goodwe_grid_export_limit
                data:
                  value: 10000
          - condition: numeric_state
            entity_id: input_number.zero_hero_export_start
            above: 0
          - action: notify.mobile_app_your_device_name # EDIT: Replace with your device name
            data:
              title: Zero Hero Complete
              message: >
                {% set start_exp = states('input_number.zero_hero_export_start') | float(0) %} 
                {% set end_exp = states('sensor.goodwe_total_energy_export') | float(0) %} 
                {% set kwh_sold = [(end_exp - start_exp), 0] | max | round(2) %}  
                {% set super_kwh = [kwh_sold, 10] | min %} 
                {% set base_kwh = [kwh_sold - 10, 0] | max %} 
                {% set profit = ((super_kwh * 0.15) + (base_kwh * 0.06)) | round(2) %} 
                {% set credit = 1.00 %} 
                {% set total = (profit + credit) | round(2) %} 
                Exported {{ kwh_sold }} kWh. Revenue: ${{ '%.2f' | format(profit) }} + $1.00 daily
                credit = ${{ '%.2f' | format(total) }}. Goodnight.
          - action: input_number.set_value
            target:
              entity_id: input_number.zero_hero_export_start
            data:
              value: 0
